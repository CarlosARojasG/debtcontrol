<!DOCTYPE html>
<html>
<head><title>Generar Íconos</title></head>
<body>
<h2>Haz clic en cada botón para descargar los íconos</h2>
<canvas id="c" style="display:none"></canvas>
<button onclick="gen(192,'icon-192.png','#007AFF',false)">📥 icon-192.png</button><br><br>
<button onclick="gen(512,'icon-512.png','#007AFF',false)">📥 icon-512.png</button><br><br>
<button onclick="gen(192,'icon-maskable-192.png','#007AFF',true)">📥 icon-maskable-192.png</button><br><br>
<button onclick="gen(512,'icon-maskable-512.png','#007AFF',true)">📥 icon-maskable-512.png</button><br><br>
<p>Guarda los 4 archivos en la carpeta <b>icons/</b> del proyecto.</p>
<script>
function gen(size, name, bg, maskable) {
  const c = document.getElementById('c');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  // Fondo
  if (maskable) {
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);
  } else {
    ctx.clearRect(0, 0, size, size);
    const r = size * 0.15;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = bg;
    ctx.fill();
  }
  // Emoji
  const fontSize = maskable ? size * 0.45 : size * 0.55;
  ctx.font = fontSize + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💰', size/2, size/2);
  // Descargar
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
