<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#007AFF" />
    <meta name="description" content="DebtControl Pro - Gestión inteligente de deudas y finanzas personales" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DebtControl" />
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png" />
    <title>DebtControl Pro - Gestión de Deudas</title>
    <link rel="manifest" href="./manifest.json" />
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      #root { min-height: 100vh; }
      .loading-screen {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; z-index: 9999;
      }
      @media (prefers-color-scheme: dark) {
        .loading-screen { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
      }
      .loading-screen.hidden { display: none; }
      .loading-emoji { font-size: 64px; animation: bounce 1s ease-in-out infinite; }
      .loading-text { font-size: 24px; font-weight: 600; margin-top: 16px; }
      .loading-sub { font-size: 14px; opacity: 0.8; margin-top: 8px; }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
    <script type="module" crossorigin src="./assets/index-Bwgcmo9Q.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/vendor-B-V5UcMf.js">
    <link rel="modulepreload" crossorigin href="./assets/charts-BiLyBmV-.js">
    <link rel="stylesheet" crossorigin href="./assets/index-BVK2nLKa.css">
  </head>
  <body>
    <!-- Protección de acceso al sitio -->
    <script src="./site-guard.js"></script>
    <div id="loading" class="loading-screen">
      <div class="loading-emoji">💰</div>
      <div class="loading-text">DebtControl Pro</div>
      <div class="loading-sub">Cargando tu información financiera...</div>
    </div>
    <div id="root"></div>
    <script>
      // === Capturar evento de instalación PWA ===
      window.dcInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.dcInstallPrompt = e;
        console.log('📲 PWA instalable detectada');
      });

      // === Un solo load event handler ===
      window.addEventListener('load', function() {
        // Ocultar loading screen
        setTimeout(function() {
          var loading = document.getElementById('loading');
          if (loading) loading.classList.add('hidden');
        }, 500);

        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js')
            .then(function(registration) {
              console.log('✅ Service Worker registrado:', registration.scope);
              setInterval(function() { registration.update(); }, 60 * 60 * 1000);
              registration.addEventListener('updatefound', function() {
                var newWorker = registration.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    showUpdateBanner(registration);
                  }
                });
              });
            })
            .catch(function(error) {
              console.log('❌ Error al registrar Service Worker:', error);
            });

          var refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!refreshing) { refreshing = true; location.reload(); }
          });
        }
      });

      function showUpdateBanner(reg) {
        if (document.getElementById('dc-update-banner')) return;
        var banner = document.createElement('div');
        banner.id = 'dc-update-banner';
        banner.innerHTML = '<span>\uD83D\uDE80 Nueva versi\u00f3n disponible</span>'
          + '<button id="dc-update-btn" style="margin-left:12px;padding:6px 16px;border:none;border-radius:8px;background:#fff;color:#007AFF;font-size:13px;font-weight:600;cursor:pointer">Actualizar</button>'
          + '<button id="dc-update-close" style="margin-left:8px;background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:0.7">&times;</button>';
        Object.assign(banner.style, {
          position: 'fixed', bottom: '0', left: '0', right: '0',
          background: 'linear-gradient(135deg, #007AFF, #5856D6)', color: '#fff',
          padding: '14px 20px', display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: '14px', fontWeight: '500', zIndex: '99999',
          boxShadow: '0 -4px 20px rgba(0,0,0,0.2)',
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
        });
        document.body.appendChild(banner);
        document.getElementById('dc-update-btn').addEventListener('click', function() {
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        });
        document.getElementById('dc-update-close').addEventListener('click', function() { banner.remove(); });
      }

      // === Online/Offline toasts ===
      window.addEventListener('online', function() {
        var toast = document.createElement('div');
        toast.textContent = '\uD83D\uDCF6 Conexi\u00f3n restaurada';
        toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#34C759;color:#fff;padding:10px 20px;border-radius:10px;z-index:99999;font-size:14px;font-weight:500;';
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
      });
      window.addEventListener('offline', function() {
        var toast = document.createElement('div');
        toast.textContent = '\uD83D\uDCF4 Sin conexi\u00f3n - Modo offline';
        toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#FF9500;color:#fff;padding:10px 20px;border-radius:10px;z-index:99999;font-size:14px;font-weight:500;';
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 3000);
      });

      // === Android back button ===
      window.addEventListener('popstate', function(e) {
        history.pushState(null, '', window.location.href);
      });
      history.pushState(null, '', window.location.href);
    </script>
    <!-- Módulo de sincronización en la nube y backup -->
    <script defer src="./cloud-sync.js"></script>
  </body>
</html>
